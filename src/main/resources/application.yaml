server:
  port: 8083

spring:
  application:
    name: HospitalMS

  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
